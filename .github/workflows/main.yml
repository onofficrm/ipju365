name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euxo pipefail

          FTP_PORT="${FTP_PORT:-21}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_SERVER" <<EOF
          set ftp:passive-mode true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 20
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 10
          set xfer:clobber true
          set cmd:fail-exit yes

          cd public_html
          put -O extend extend/_debugbar.extend.php
          mput -O extend extend/._*.php
          put -O theme/rb.basic theme/rb.basic/index.php
          put -O theme/rb.basic theme/rb.basic/head.php
          put -O theme/rb.basic theme/rb.basic/head.sub.php
          put -O theme/rb.basic theme/rb.basic/tail.php
          put -O theme/rb.basic theme/rb.basic/boon-build-home.php
          put -O theme/rb.basic/boon-build theme/rb.basic/boon-build/home.php
          put -O theme/rb.basic/boon-build theme/rb.basic/boon-build/home.css

          bye
          EOF
